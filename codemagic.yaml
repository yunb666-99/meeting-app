workflows:
  android-build:
    name: Android Build
    max_build_duration: 30
    environment:
      flutter: 3.22.0
    scripts:
      - name: Get packages
        script: cd 安卓App/mobile && flutter pub get
      - name: Build APK
        script: cd 安卓App/mobile && flutter build apk --release
    artifacts:
      - 安卓App/mobile/build/app/outputs/flutter-apk/app-release.apk

  ios-build:
    name: iOS Build
    max_build_duration: 30
    environment:
      flutter: 3.22.0
      xcode: 16.0
      cocoapods: default
    scripts:
      - name: Get packages
        script: cd 苹果App/mobile && flutter pub get
      - name: Build iOS
        script: |
          cd 苹果App/mobile
          flutter build ios --release --no-codesign
    artifacts:
      - 苹果App/mobile/build/ios/iphoneos/Runner.app
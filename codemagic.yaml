workflows:
  android-build:
    name: Android Build
    max_build_duration: 30
    environment:
      flutter: 3.22.0
    scripts:
      - name: Get packages
        script: cd 安卓App/mobile && flutter pub get
      - name: Build APK
        script: cd 安卓App/mobile && flutter build apk --release
    artifacts:
      - 安卓App/mobile/build/app/outputs/flutter-apk/app-release.apk